<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syed Raqueed — Platform & Systems Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: oklch(9% 0.012 240);
      --bg-1: oklch(13% 0.014 240);
      --fg: oklch(94% 0.008 240);
      --fg-muted: oklch(58% 0.010 240);
      --fg-faint: oklch(32% 0.010 240);
      --accent: oklch(72% 0.20 75);
      --accent-2: oklch(72% 0.20 320);
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.07);
      --radius: 20px;
      --font: 'Space Grotesk', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    /* NAV */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: rgba(8,10,16,0.75);
      backdrop-filter: blur(20px) saturate(1.3);
      border-bottom: 1px solid var(--glass-border);
    }
    .nav-logo { font-family: var(--mono); font-size: 0.82rem; color: var(--accent); letter-spacing: 0.06em; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { color: var(--fg-muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: var(--fg); }
    /* PAGE */
    .page { max-width: 1000px; margin: 0 auto; padding: 0 32px; }
    /* HERO */
    .hero {
      position: relative; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; overflow: hidden; padding-top: 80px;
    }
    .hero-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    .hero-glow {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(70% 55% at 50% 0%, rgba(210,140,0,0.12), transparent 70%),
        radial-gradient(40% 40% at 80% 30%, rgba(180,80,0,0.08), transparent 70%);
      filter: blur(18px);
    }
    .hero-spotlight { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
    .hero-content { position: relative; z-index: 2; max-width: 780px; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 18px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.04);
      font-family: var(--mono); font-size: 0.72rem; color: var(--accent);
      margin-bottom: 32px; letter-spacing: 0.05em;
      animation: fadeDown 0.6s 0.1s ease both;
    }
    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      animation: pulseDot 2.2s ease-in-out infinite;
    }
    .hero-headline {
      font-size: clamp(2.5rem, 6vw, 4.6rem);
      font-weight: 700; line-height: 1.08; letter-spacing: -0.035em;
      margin-bottom: 28px;
    }
    .hero-headline .char {
      display: inline-block; opacity: 0;
      transform: translateY(28px) rotate(-3deg);
      animation: charReveal 0.45s ease forwards;
    }
    .hero-subline {
      font-size: clamp(1rem, 2vw, 1.175rem);
      color: var(--fg-muted); max-width: 580px; margin: 0 auto 44px;
      line-height: 1.75; min-height: 2em;
      animation: fadeUp 0.7s 0.9s ease both;
    }
    .cursor {
      display: inline-block; width: 2px; height: 1.05em;
      background: var(--accent); vertical-align: text-bottom; margin-left: 2px;
      animation: blink 0.85s step-end infinite;
    }
    .hero-ctas {
      display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
      animation: fadeUp 0.7s 1.1s ease both;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 30px; border-radius: 999px;
      font-family: var(--font); font-size: 0.9rem; font-weight: 600;
      cursor: pointer; border: none; text-decoration: none;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .btn-primary { background: var(--accent); color: #000; box-shadow: 0 0 28px rgba(210,140,0,0.3); }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 0 50px rgba(210,140,0,0.45); }
    .btn-secondary { background: var(--glass); color: var(--fg); border: 1px solid var(--glass-border); }
    .btn-secondary:hover { transform: translateY(-3px); background: rgba(255,255,255,0.08); }
    .scroll-hint {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      opacity: 0; font-family: var(--mono); font-size: 0.68rem; color: var(--fg-faint);
      animation: fadeUp 0.8s 1.6s ease forwards;
    }
    .scroll-line {
      width: 1px; height: 42px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      animation: scrollPulse 2.2s ease-in-out infinite;
    }
    /* DIVIDER */
    .divider { height: 1px; background: var(--glass-border); opacity: 0.6; }
    /* SECTIONS */
    .section { padding: 88px 0; }
    .section-head { text-align: center; margin-bottom: 52px; }
    .section-label {
      display: block; font-family: var(--mono); font-size: 0.68rem;
      color: var(--accent); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 14px;
    }
    .section-h2 {
      font-size: clamp(1.9rem, 3.5vw, 2.6rem); font-weight: 700;
      letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 10px;
    }
    .section-sub { color: var(--fg-muted); font-size: 1rem; }
    /* REVEAL */
    .reveal { opacity: 0; transform: translateY(36px); transition: opacity 0.75s ease, transform 0.75s ease; }
    .reveal.in { opacity: 1; transform: translateY(0); }
    /* SPOTLIGHTS */
    .spotlights { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .spot-card {
      padding: 22px 24px; border-radius: 16px;
      background: var(--glass); border: 1px solid var(--glass-border);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }
    .spot-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
      border-color: rgba(0,200,255,0.22);
    }
    .spot-lbl { font-family: var(--mono); font-size: 0.68rem; color: var(--accent); margin-bottom: 10px; }
    .spot-title { font-weight: 600; font-size: 1rem; margin-bottom: 5px; }
    .spot-desc { font-family: var(--mono); font-size: 0.78rem; color: var(--fg-muted); line-height: 1.5; }
    /* CAROUSEL */
    .carousel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    .car-main {
      border-radius: var(--radius); overflow: hidden;
      background: var(--glass); border: 1px solid var(--glass-border);
      cursor: pointer; transition: box-shadow 0.3s;
    }
    .car-main:hover { box-shadow: 0 40px 100px rgba(0,0,0,0.55); }
    .car-img {
      width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block;
      transition: transform 0.45s ease;
    }
    .car-main:hover .car-img { transform: scale(1.04); }
    .car-body { padding: 26px; display: grid; gap: 10px; }
    .car-title { font-size: 1.1rem; font-weight: 600; }
    .car-blurb { font-size: 0.875rem; color: var(--fg-muted); line-height: 1.65; }
    .car-link {
      font-family: var(--mono); font-size: 0.73rem; color: var(--accent);
      text-decoration: none; display: inline-flex; align-items: center; gap: 5px; margin-top: 6px;
    }
    .car-link:hover { opacity: 0.75; }
    .car-thumbs { display: grid; gap: 12px; }
    .car-thumb {
      display: grid; grid-template-columns: 76px 1fr;
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--glass-border); cursor: pointer;
      opacity: 0.45; transition: opacity 0.25s, border-color 0.25s, transform 0.25s;
    }
    .car-thumb.on { opacity: 1; border-color: var(--accent); }
    .car-thumb:hover:not(.on) { opacity: 0.7; transform: translateX(4px); }
    .car-thumb-img { width: 76px; height: 58px; object-fit: cover; display: block; }
    .car-thumb-body { padding: 10px 14px; }
    .car-thumb-title { font-size: 0.825rem; font-weight: 600; }
    .car-thumb-blurb {
      font-size: 0.73rem; color: var(--fg-muted);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    /* TECH CARDS */
    .tech-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .tech-card {
      padding: 28px 30px; border-radius: var(--radius); min-height: 200px;
      background: var(--glass); border: 1px solid var(--glass-border);
      display: grid; gap: 12px; align-content: start;
      transform-style: preserve-3d; will-change: transform;
      transition: box-shadow 0.5s ease;
    }
    .tech-card-title { font-size: 1.05rem; font-weight: 600; }
    .tech-card-desc { font-size: 0.85rem; color: var(--fg-muted); line-height: 1.6; }
    .tech-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .tech-tag {
      padding: 4px 13px; border-radius: 999px;
      background: rgba(255,255,255,0.055); border: 1px solid rgba(255,255,255,0.08);
      font-family: var(--mono); font-size: 0.70rem; color: var(--fg-muted);
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .tech-tag:hover {
      background: rgba(0,200,255,0.1); color: var(--accent); border-color: rgba(0,200,255,0.28);
    }
    /* HOBBIES */
    .hobbies-grid {
      display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px;
    }
    .hobby {
      position: relative; border-radius: 16px; overflow: hidden;
      background: #000; aspect-ratio: 16/10; display: block; text-decoration: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .hobby:nth-child(1) { grid-column: 1 / span 6; }
    .hobby:nth-child(2) { grid-column: 7 / span 6; }
    .hobby:nth-child(3) { grid-column: 1 / span 4; }
    .hobby:nth-child(4) { grid-column: 5 / span 4; }
    .hobby:nth-child(5) { grid-column: 9 / span 4; }
    .hobby:hover { transform: translateY(-4px); box-shadow: 0 28px 60px rgba(0,0,0,0.5); }
    .hobby-img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transform: scale(1.02); transition: transform 0.45s ease, filter 0.45s ease;
    }
    .hobby:hover .hobby-img { transform: scale(1.07); filter: saturate(1.1); }
    .hobby-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 60%);
      transition: opacity 0.3s;
    }
    .hobby:hover .hobby-overlay { opacity: 1.2; }
    .hobby-lbl {
      position: absolute; bottom: 13px; left: 13px;
      background: rgba(0,0,0,0.58); border: 1px solid rgba(255,255,255,0.1);
      color: #fff; font-size: 0.78rem; font-weight: 600;
      padding: 5px 12px; border-radius: 10px;
      backdrop-filter: blur(8px); letter-spacing: 0.02em;
    }
    /* TESTIMONIALS */
    .test-wrap {
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent 0, black 8%, black 92%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0, black 8%, black 92%, transparent 100%);
    }
    .test-track {
      display: flex; gap: 20px; width: max-content;
      animation: scrollLeft 38s linear infinite;
    }
    .test-track:hover { animation-play-state: paused; }
    .test-card {
      min-width: 420px; max-width: 420px; padding: 28px;
      border-radius: 20px; background: var(--glass); border: 1px solid var(--glass-border);
      display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: start;
    }
    .test-avatar {
      width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
      border: 1px solid var(--glass-border);
    }
    .test-quote { font-size: 0.92rem; line-height: 1.7; margin-bottom: 10px; }
    .test-name { font-family: var(--mono); font-size: 0.7rem; color: var(--fg-muted); }
    /* CTA */
    .cta-card {
      border-radius: 26px; padding: 52px;
      background: var(--glass); border: 1px solid rgba(0,200,255,0.13);
      box-shadow: 0 0 100px rgba(0,200,255,0.05), 0 30px 80px rgba(0,0,0,0.4);
      display: grid; grid-template-columns: 1fr auto; gap: 48px; align-items: center;
      position: relative; overflow: hidden;
    }
    .cta-glow {
      position: absolute; top: -80px; right: -80px;
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(210,140,0,0.12), transparent 70%);
      animation: rotateSlow 10s linear infinite; pointer-events: none;
    }
    .cta-h2 { font-size: clamp(1.4rem, 2.5vw, 2rem); font-weight: 700; letter-spacing: -0.025em; margin-bottom: 12px; }
    .cta-sub { color: var(--fg-muted); font-size: 0.925rem; }
    /* FOOTER */
    .footer {
      padding: 36px 0; text-align: center;
      font-family: var(--mono); font-size: 0.72rem; color: var(--fg-faint);
      border-top: 1px solid var(--glass-border);
    }
    /* STATS ROW */
    .hero-stats {
      display: flex; align-items: center; gap: 20px; justify-content: center;
      margin-top: 32px; animation: fadeUp 0.7s 1.4s ease both;
    }
    .hero-stat { font-family: var(--mono); font-size: 0.72rem; color: var(--fg-faint); letter-spacing: 0.05em; }
    .hero-stat strong { color: var(--accent); font-size: 0.85rem; }
    .hero-stat-sep { color: var(--fg-faint); opacity: 0.35; }
    /* LOGO BOX */
    .logo-sq {
      width: 52px; height: 52px; border-radius: 10px; flex-shrink: 0;
      background: #fff; display: flex; align-items: center; justify-content: center;
      overflow: hidden; padding: 5px;
    }
    .logo-sq img { width: 100%; height: 100%; object-fit: contain; }
    .logo-wide {
      width: 80px; height: 40px; border-radius: 8px; flex-shrink: 0;
      background: #fff; display: flex; align-items: center; justify-content: center;
      overflow: hidden; padding: 5px 8px;
    }
    .logo-wide img { width: 100%; height: 100%; object-fit: contain; }
    /* EXPERIENCE — company cards */
    .exp-company-card {
      border-radius: var(--radius); background: var(--glass);
      border: 1px solid var(--glass-border); overflow: hidden;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .exp-company-card:hover { border-color: rgba(210,140,0,0.18); box-shadow: 0 20px 60px rgba(0,0,0,0.35); }
    .exp-company-header {
      display: flex; align-items: center; gap: 18px;
      padding: 22px 26px; border-bottom: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.02);
    }
    .exp-company-name { font-weight: 700; font-size: 1rem; }
    .exp-company-tenure { font-family: var(--mono); font-size: 0.68rem; color: var(--fg-faint); margin-top: 3px; }
    .exp-roles { display: grid; }
    .exp-role-item { padding: 22px 26px; }
    .exp-role-item + .exp-role-item { border-top: 1px solid var(--glass-border); }
    .exp-role-title { font-weight: 600; font-size: 0.92rem; margin-bottom: 3px; }
    .exp-role-time { font-family: var(--mono); font-size: 0.67rem; color: var(--accent); letter-spacing: 0.06em; margin-bottom: 14px; }
    .exp-bullets { list-style: none; display: grid; gap: 8px; margin-bottom: 16px; }
    .exp-bullets li { font-size: 0.84rem; color: var(--fg-muted); line-height: 1.6; padding-left: 18px; position: relative; }
    .exp-bullets li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-size: 0.7rem; top: 2px; }
    .exp-tags { display: flex; flex-wrap: wrap; gap: 7px; }
    .exp-tag { font-family: var(--mono); font-size: 0.67rem; padding: 3px 10px; border-radius: 999px; background: rgba(210,140,0,0.08); border: 1px solid rgba(210,140,0,0.18); color: var(--accent); }
    /* EDUCATION */
    .edu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .edu-card {
      padding: 26px; border-radius: var(--radius);
      background: var(--glass); border: 1px solid var(--glass-border);
      display: grid; grid-template-columns: auto 1fr; gap: 18px; align-items: start;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .edu-card:hover { transform: translateY(-4px); border-color: rgba(210,140,0,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
    .edu-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
    .edu-deg { font-size: 0.82rem; color: var(--fg-muted); line-height: 1.5; margin-bottom: 6px; }
    .edu-thesis { font-family: var(--mono); font-size: 0.68rem; color: var(--fg-faint); line-height: 1.45; }
    /* PUBLICATIONS */
    .pub-stats { display: flex; gap: 40px; justify-content: center; margin-bottom: 44px; }
    .pub-stat-num { font-family: var(--mono); font-size: 2.4rem; font-weight: 700; letter-spacing: -0.04em; color: var(--accent); display: block; line-height: 1; }
    .pub-stat-lbl { font-family: var(--mono); font-size: 0.7rem; color: var(--fg-muted); margin-top: 4px; display: block; }
    .pub-list { display: grid; gap: 12px; }
    .pub-card {
      padding: 20px 24px; border-radius: 16px;
      background: var(--glass); border: 1px solid var(--glass-border);
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .pub-card:hover { border-color: rgba(210,140,0,0.18); box-shadow: 0 14px 40px rgba(0,0,0,0.35); }
    .pub-title { font-size: 0.88rem; font-weight: 600; line-height: 1.45; margin-bottom: 6px; }
    .pub-meta { font-family: var(--mono); font-size: 0.67rem; color: var(--fg-muted); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
    .pub-badge { padding: 2px 9px; border-radius: 999px; font-size: 0.63rem; font-weight: 600; background: rgba(210,140,0,0.15); color: var(--accent); border: 1px solid rgba(210,140,0,0.25); }
    .pub-doi { font-family: var(--mono); font-size: 0.67rem; color: var(--accent); text-decoration: none; padding: 2px 9px; border-radius: 999px; border: 1px solid rgba(210,140,0,0.2); transition: background 0.2s; }
    .pub-doi:hover { background: rgba(210,140,0,0.1); }
    .pub-cite { text-align: center; min-width: 52px; }
    .pub-cite-num { font-family: var(--mono); font-size: 1.6rem; font-weight: 700; color: var(--accent); line-height: 1; display: block; }
    .pub-cite-lbl { font-family: var(--mono); font-size: 0.6rem; color: var(--fg-faint); }
    .pub-authors { font-family: var(--mono); font-size: 0.68rem; color: var(--fg-faint); margin-bottom: 6px; margin-top: 4px; }
    .pub-top { display: flex; gap: 20px; align-items: flex-start; }
    .pub-right { display: flex; flex-direction: column; align-items: center; gap: 10px; min-width: 60px; flex-shrink: 0; }
    .pub-chevron { font-size: 1rem; color: var(--fg-faint); }
    .pub-main { width: 100%; }
    .pub-open { border-color: rgba(210,140,0,0.25) !important; background: rgba(210,140,0,0.03) !important; }
    .pub-expand { margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--glass-border); }
    .pub-abstract { font-size: 0.85rem; color: var(--fg-muted); line-height: 1.7; margin-bottom: 14px; }
    .pub-kw { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
    .pub-kw-chip { font-family: var(--mono); font-size: 0.65rem; padding: 3px 9px; border-radius: 999px; background: var(--glass); border: 1px solid var(--glass-border); color: var(--fg-faint); }
    .pub-funding { display: flex; gap: 10px; align-items: baseline; margin-bottom: 12px; padding: 10px 14px; border-radius: 10px; background: rgba(210,140,0,0.06); border: 1px solid rgba(210,140,0,0.15); }
    .pub-funding-lbl { font-family: var(--mono); font-size: 0.65rem; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; flex-shrink: 0; }
    .pub-funding-val { font-size: 0.78rem; color: var(--fg-muted); line-height: 1.5; }
    .pub-expand-hint { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .pub-card { cursor: pointer; }

</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Hooks ──────────────────────────────────────────────────────────────
    function useInView(ref, threshold = 0.12) {
      const [vis, setVis] = useState(false);
      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { setVis(true); obs.disconnect(); }
        }, { threshold });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return vis;
    }

    function useTypewriter(phrases, speed = 52) {
      const [display, setDisplay] = useState('');
      const [pi, setPi] = useState(0);
      const [ci, setCi] = useState(0);
      const [del, setDel] = useState(false);
      useEffect(() => {
        const cur = phrases[pi];
        const delay = del ? speed * 0.45 : (ci === cur.length ? 2600 : speed);
        const t = setTimeout(() => {
          if (!del && ci < cur.length) { setDisplay(cur.slice(0, ci + 1)); setCi(c => c + 1); }
          else if (!del && ci === cur.length) { setDel(true); }
          else if (del && ci > 0) { setDisplay(cur.slice(0, ci - 1)); setCi(c => c - 1); }
          else { setDel(false); setPi(i => (i + 1) % phrases.length); }
        }, delay);
        return () => clearTimeout(t);
      }, [phrases, pi, ci, del, speed]);
      return display;
    }

    // ── Circuit Board Canvas ───────────────────────────────────────────────
    function CircuitCanvas() {
      const ref = useRef(null);
      useEffect(() => {
        const canvas = ref.current; if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let raf;
        const resize = () => {
          canvas.width = canvas.offsetWidth;
          canvas.height = canvas.offsetHeight;
        };
        resize();
        window.addEventListener('resize', resize);

        // Grid nodes
        const COLS = 14, ROWS = 9;
        const nodes = [];
        for (let c = 0; c <= COLS; c++)
          for (let r = 0; r <= ROWS; r++)
            nodes.push({ gx: c, gy: r, phase: Math.random() * Math.PI * 2 });

        // Traces — pairs of nodes with animated stroke
        const traces = Array.from({ length: 22 }, () => {
          const a = nodes[Math.floor(Math.random() * nodes.length)];
          const b = nodes[Math.floor(Math.random() * nodes.length)];
          return { a, b, prog: 0, spd: 0.004 + Math.random() * 0.005, delay: Math.random() * 180, alpha: 0.25 + Math.random() * 0.35 };
        });

        let tick = 0;
        const draw = () => {
          tick++;
          canvas.width = canvas.offsetWidth; // clears + keeps sharp
          canvas.height = canvas.offsetHeight;

          const W = canvas.width, H = canvas.height;
          const nx = (n) => (n.gx / COLS) * W;
          const ny = (n) => (n.gy / ROWS) * H;

          // Nodes (faint blips)
          nodes.forEach(n => {
            const p = Math.sin(tick * 0.018 + n.phase) * 0.5 + 0.5;
            ctx.beginPath();
            ctx.arc(nx(n), ny(n), 1.8, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(210,140,0,${0.05 + p * 0.09})`;
            ctx.fill();
          });

          // Animated L-shaped traces
          traces.forEach(t => {
            if (tick < t.delay) return;
            t.prog = Math.min(t.prog + t.spd, 1);
            if (Math.random() < 0.0006) { t.prog = 0; t.delay = tick + 80 + Math.random() * 160; }

            const ax = nx(t.a), ay = ny(t.a), bx = nx(t.b), by = ny(t.b);
            const p1 = Math.min(t.prog * 2, 1);
            const p2 = Math.max((t.prog - 0.5) * 2, 0);
            const midX = ax + (bx - ax) * p1;
            const curY = ay + (by - ay) * p2;

            ctx.strokeStyle = `rgba(210,140,0,${t.alpha * Math.min(t.prog * 3, 1)})`;
            ctx.lineWidth = 0.85; ctx.lineCap = 'square';
            ctx.beginPath(); ctx.moveTo(ax, ay);
            ctx.lineTo(midX, ay);
            if (t.prog > 0.5) ctx.lineTo(bx, curY);
            ctx.stroke();

            // Via circles at junctions
            if (t.prog > 0.08) {
              ctx.beginPath(); ctx.arc(ax, ay, 3, 0, Math.PI * 2);
              ctx.strokeStyle = `rgba(210,140,0,${t.alpha * 0.75})`; ctx.lineWidth = 1;
              ctx.stroke();
            }
            if (t.prog > 0.55) {
              ctx.beginPath(); ctx.arc(bx, by, 3, 0, Math.PI * 2);
              ctx.strokeStyle = `rgba(210,140,0,${t.alpha * 0.75 * p2})`;
              ctx.stroke();
            }
          });

          raf = requestAnimationFrame(draw);
        };
        draw();
        return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
      }, []);
      return <canvas ref={ref} className="hero-canvas" />;
    }

    // ── Reveal wrapper ─────────────────────────────────────────────────────

      // Build char spans with stagger

            </div>

            <div className="scroll-line" />
          </div>
        </section>
      );
    }

    const SPOTS = [

    // ── Highlights Carousel ────────────────────────────────────────────────
    const CARDS = [

      { title: 'HIL & Validation',         blurb: 'PyTest + Jenkins + HIL rigs to scale regression for GNSS, power behavior and OTA.',    img: 'https://res.cloudinary.com/dvgohigq8/image/upload/f_auto,q_auto/portfolio/gallery/USA/Tennessee/DSCF4775' },

    function TechCard({ card, delay }) {
      const ref = useRef(null);
      const onMove = (e) => {
        const el = ref.current; if (!el) return;
        const r = el.getBoundingClientRect();
        const dx = ((e.clientX - r.left) / r.width - 0.5) * 2;
        const dy = ((e.clientY - r.top)  / r.height - 0.5) * 2;
        el.style.transition = 'none';
        el.style.transform = `perspective(700px) rotateY(${dx * 14}deg) rotateX(${-dy * 14}deg) translateZ(16px)`;
        el.style.boxShadow = `${-dx * 28}px ${-dy * 18}px 70px rgba(0,0,0,0.55), 0 0 50px rgba(210,140,0,0.1)`;
        el.style.borderColor = `rgba(210,140,0,${0.15 + Math.abs(dx) * 0.2 + Math.abs(dy) * 0.2})`;
        // Moving shine highlight
        const px = ((e.clientX - r.left) / r.width) * 100;
        const py = ((e.clientY - r.top) / r.height) * 100;
        el.style.background = `radial-gradient(160px circle at ${px}% ${py}%, rgba(210,140,0,0.07), rgba(255,255,255,0.025) 60%, transparent)`;
      };
      const onLeave = () => {
        const el = ref.current; if (!el) return;
        el.style.transition = 'transform 0.65s ease, box-shadow 0.65s ease, border-color 0.65s ease, background 0.65s ease';
        el.style.transform = '';
        el.style.boxShadow = '';
        el.style.borderColor = '';
        el.style.background = '';

      return (

    const HOBBIES = [

      { title: 'Photography', img: 'https://res.cloudinary.com/dvgohigq8/image/upload/f_auto,q_auto/portfolio/gallery/USA/Chicago/DSCF5707'  },
      { title: 'Traveling',   img: 'https://res.cloudinary.com/dvgohigq8/image/upload/f_auto,q_auto/portfolio/gallery/USA/New%20York/DSCF2088' },

    function Hobbies() {

    // ── Testimonials ───────────────────────────────────────────────────────
    const TESTI = [
      { quote: "Raqueed's firmware landed cleanly in production — robust drivers, clear state machines, and logs that made fleet issues debuggable.", name: 'Srinivas K.', role: 'Sr. Platform Architect',          img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Srinivas&backgroundColor=b6e3f4' },

    function Testimonials() {

    function App() {

      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
      const merge = patch => {
        const next = { ...tweaks, ...patch };
        setTweaks(next);
        window.parent?.postMessage({ type:'__edit_mode_set_keys', edits: next }, '*');
      };

      useEffect(() => {
        const h = e => {
          if (e.data?.type === '__activate_edit_mode')   setOpen(true);
          if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
        };
        window.addEventListener('message', h);
        window.parent?.postMessage({ type:'__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', h);
      }, []);
